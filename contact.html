<style>
body {font-family:'Montserrat',sans-serif;color:#212121;background:#f5f5f5;line-height:1.6;margin:0;padding:0;}
a{text-decoration:none;}
header,footer{padding:10px 5%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
header{display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}

nav ul li a{color:#2e9d41;font-weight:600;transition:color 0.3s;}

section{padding:80px 5%;}
section:nth-child(even){background:#e9ecef;}
section h2{font-family:'Noto Serif', serif;font-weight:800;font-size:2.5rem;margin-bottom:20px;color:#4c3831;}
section p{margin-bottom:20px;}
button{background:#2e9d41;color:#fff;border:none;border-radius:20px;padding:10px 25px;cursor:pointer;transition:background 0.3s;}
button:hover{background:#257e34;}
footer{text-align:center;padding:30px 5%;background:#212121;color:#fff;}
footer a{color:#2e9d41;}
@media(max-width:768px){nav ul{flex-direction:column;gap:10px;}}
